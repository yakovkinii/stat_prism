name: Build Windows installer

# Builds a standalone StatPrism with Nuitka and wraps it in an Inno Setup installer.
#   * push a tag  v1.2.3   -> builds and attaches the installer to a GitHub Release
#   * "Run workflow"       -> builds and uploads the installer as a workflow artifact
#
# ONE-TIME CONFIGURATION (see packaging/README.md):
#   Set a permanent AppId GUID in packaging/installer.iss (keep it constant across releases).

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to attach the installer to the tag's Release

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Read app version from src/about.py
        id: ver
        shell: pwsh
        run: |
          $v = (Select-String -Path src/about.py -Pattern 'version\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "StatPrism version: $v"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "nuitka>=2.4"

      - name: Build standalone (Nuitka)
        # The build options live as `# nuitka-project:` directives in launcher.py.
        run: python -m nuitka --assume-yes-for-downloads launcher.py

      - name: Download Visual C++ redistributable (bundled as a safety net)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "packaging/vc_redist.x64.exe"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DAppVersion=${{ steps.ver.outputs.version }}" packaging/installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: StatPrism-${{ steps.ver.outputs.version }}-setup
          path: packaging/Output/*.exe
          if-no-files-found: error

      - name: Attach installer to the Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/Output/*.exe
